<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Confirmation | OVATION</title>
  
  <!-- CSS -->
  <link rel="stylesheet" href="css/styles.css" />

  <!-- Preconnect for fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
</head>
<body class="bg-background">

  <!-- Shared Header injected here -->
  <div id="header-container"></div>

  <main class="min-h-screen">
    <div id="confirmation-content" class="container pb-24 pt-32 md:pt-40 flex flex-col items-center max-w-2xl text-center">
      <!-- Will be populated by JS based on last order in localStorage -->
      <div class="py-20 text-muted">Loading order details...</div>
    </div>
  </main>

  <!-- Shared Footer injected here -->
  <div id="footer-container"></div>
  
  <!-- Floating Nav injected here -->
  <div id="floating-nav-container"></div>

  <!-- Scripts -->
  <!-- GSAP & Plugins -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <!-- Lenis -->
  <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.29/bundled/lenis.min.js"></script>
  
  <!-- App Logic -->
  <script src="js/data.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/components.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/confirmation.js"></script>
</body>
</html>
