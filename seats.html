<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Select Seats | OVATION</title>
  
  <!-- CSS -->
  <link rel="stylesheet" href="css/styles.css" />

  <!-- Preconnect for fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
</head>
<body class="bg-background">

  <!-- Shared Header injected here -->
  <div id="header-container"></div>

  <main class="min-h-screen pt-24 pb-20">
    <div class="container">
      <div class="mb-8 flex justify-between items-center flex-wrap gap-4">
        <div>
          <h1 class="font-display text-3xl" id="movie-title">Movie Title</h1>
          <p class="text-muted" id="theatre-info">Theatre Name | Showtime</p>
        </div>
        <a href="events.html" id="back-btn" class="btn btn--outline">Back to Movie</a>
      </div>

      <div class="seats-layout-grid">
        <!-- Main Seating Area -->
        <div class="theatre-container">
          <!-- Screen -->
          <div class="theatre-screen">
            <div class="theatre-screen__curve"></div>
            <p class="text-center text-sm text-muted mt-2 uppercase tracking-wider">All eyes this way</p>
          </div>

          <!-- Legend -->
          <div class="seat-legend">
            <div class="legend-item"><div class="seat seat--available"></div> Available</div>
            <div class="legend-item"><div class="seat seat--selected"></div> Selected</div>
            <div class="legend-item"><div class="seat seat--recommended"></div> Recommended</div>
            <div class="legend-item"><div class="seat seat--booked"></div> Booked</div>
          </div>

          <!-- Seats Layout will be generated here -->
          <div id="seat-map" class="seat-map"></div>
        </div>

        <!-- Booking Summary Sidebar -->
        <div class="sticky-sidebar">
          <div class="booking-summary">
            <h2 class="font-display text-xl mb-6">Booking Summary</h2>
            
            <div class="summary-details">
              <div class="summary-row">
                <span class="text-muted">Selected Seats</span>
                <span id="selected-seats-list" class="font-medium text-right break-words max-w-[60%]">None</span>
              </div>
              <div class="summary-row">
                <span class="text-muted">Tickets</span>
                <span id="ticket-count" class="font-medium">0</span>
              </div>
              
              <div id="price-breakdown" class="mt-4 pt-4 border-t border-border">
                <!-- Prices will be listed here dynamically -->
              </div>
            </div>

            <div class="summary-total mt-6 pt-4 border-t border-border flex justify-between items-center">
              <span class="text-lg">Total</span>
              <span id="total-price" class="text-2xl font-display">INR 0</span>
            </div>

            <div class="mt-6">
              <button id="proceed-btn" class="btn btn--primary btn--full" disabled>Proceed to Pay</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Shared Footer injected here -->
  <div id="footer-container"></div>
  
  <!-- Floating Nav injected here -->
  <div id="floating-nav-container"></div>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.29/bundled/lenis.min.js"></script>
  
  <script src="js/state.js"></script>
  <script src="js/data.js"></script>
  <script src="js/booking.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/components.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/seats.js"></script>
</body>
</html>
