<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout | OVATION</title>
  
  <!-- CSS -->
  <link rel="stylesheet" href="css/styles.css" />

  <!-- Preconnect for fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
</head>
<body class="bg-background">

  <!-- Shared Header injected here -->
  <div id="header-container"></div>

  <main class="min-h-screen">
    <div class="container pb-24 pt-32 md:pt-40">
      
      <a href="events.html" class="back-link">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon--md"><path d="m15 18-6-6 6-6"/></svg>
        Continue shopping
      </a>

      <div id="checkout-content">
        <!-- Will be populated by JS if cart has items, otherwise empty state -->
        <div class="py-20 text-center text-muted">Loading cart...</div>
      </div>

    </div>
  </main>

  <!-- Shared Footer injected here -->
  <div id="footer-container"></div>
  
  <!-- Floating Nav injected here -->
  <div id="floating-nav-container"></div>

  <!-- Scripts -->
  <!-- GSAP & Plugins -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <!-- Lenis -->
  <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.29/bundled/lenis.min.js"></script>
  
  <!-- App Logic -->
  <script src="js/data.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/components.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/checkout.js"></script>
</body>
</html>
